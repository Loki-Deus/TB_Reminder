services:
  tb-bot:
    build: .
    container_name: tb-reminder
    restart: unless-stopped

    environment:
      - DISCORD_TOKEN=${DISCORD_TOKEN}
      - TW_CHANNEL_ID=${TW_CHANNEL_ID}
      - OFFICER_ID=${OFFICER_ID}
      - MEMBER_ROLE_ID=${MEMBER_ROLE_ID}
      - MANAGER_IDS=${MANAGER_IDS}
      - DATA_DIR=/app/data

    volumes:
      - tb-stats:/app/data

volumes:
  tb-stats: